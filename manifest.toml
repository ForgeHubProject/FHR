# FHR Official Source Manifest
# Fetched by: forge source add https://raw.githubusercontent.com/yakupatahanov/fhr/main/manifest.toml

name        = "fhr-official"
url         = "https://raw.githubusercontent.com/yakupatahanov/fhr/main"
version     = "1.0"
description = "Official Forge Handler Repository"
maintainer  = "ForgeHub Project"

# ── Formats ───────────────────────────────────────────────────────────────────
# Each key is a file extension mapped directly to a handler name and version.
# plain-text extensions (.txt, .md, etc.) are handled by Forge's built-in
# text handler and do not appear here.

[formats]
".gltf" = { handler = "gltf-scene", version = "1.0.0" }
".glb"  = { handler = "gltf-scene", version = "1.0.0" }

# ── Assets ────────────────────────────────────────────────────────────────────
# Download paths for handler binaries and renderer bundles.
# Forge constructs the full URL as: {url}/{path}
#
# Binaries are published as GitHub release assets once a tag is cut.
# Update these paths after each release.

[assets.handlers."gltf-scene"."1.0.0"]
"linux-amd64"   = "releases/download/gltf-scene-v1.0.0/forge-handler-gltf-scene_linux-amd64"
"darwin-amd64"  = "releases/download/gltf-scene-v1.0.0/forge-handler-gltf-scene_darwin-amd64"
"darwin-arm64"  = "releases/download/gltf-scene-v1.0.0/forge-handler-gltf-scene_darwin-arm64"
"windows-amd64" = "releases/download/gltf-scene-v1.0.0/forge-handler-gltf-scene_windows-amd64.exe"
"wasm"          = "releases/download/gltf-scene-v1.0.0/forge-handler-gltf-scene.wasm"

[assets.renderers."gltf-scene"."1.0.0"]
"esm" = "releases/download/gltf-scene-v1.0.0/renderer.js"
