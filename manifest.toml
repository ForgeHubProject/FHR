# FHR Official Source Manifest
# Fetched by: forge source add https://raw.githubusercontent.com/yakupatahanov/fhr/main/manifest.toml

name        = "fhr-official"
url         = "https://raw.githubusercontent.com/yakupatahanov/fhr/main"
version     = "1.0"
description = "Official Forge Handler Repository"
maintainer  = "ForgeHub Project"

# ── Formats ───────────────────────────────────────────────────────────────────
# Each entry maps a file extension to the handler that owns it.
# Handler packages live in packages/handler-<name>/.
#
# [formats]
# ".gltf" = { handler = "gltf-scene", version = "1.0.0" }
# ".glb"  = { handler = "gltf-scene", version = "1.0.0" }
# ".txt"  = { handler = "plain-text", version = "1.0.0" }
# ".md"   = { handler = "plain-text", version = "1.0.0" }

[formats]
# Handlers will be listed here as packages are published.

# ── Domains ───────────────────────────────────────────────────────────────────
# Named shorthand groups. 'forge formats add domain:3d' expands to all
# extensions listed under that domain key.

[domains]
"3d"    = [".gltf", ".glb", ".obj", ".blend", ".fbx", ".usd"]
"image" = [".png", ".jpg", ".jpeg", ".exr", ".hdr", ".tif"]
"text"  = [".txt", ".md", ".rst", ".yaml", ".json", ".toml"]
"cad"   = [".step", ".stp", ".iges", ".igs", ".f3d"]

# ── Assets ────────────────────────────────────────────────────────────────────
# Download paths for handler binaries and renderer bundles.
# Forge constructs: {url}/{assets.handlers.{name}.{version}.{platform}}
#
# [assets.handlers."gltf-scene"."1.0.0"]
# "linux-amd64"   = "releases/gltf-scene/1.0.0/forge-handler-gltf-scene_linux-amd64"
# "darwin-arm64"  = "releases/gltf-scene/1.0.0/forge-handler-gltf-scene_darwin-arm64"
# "windows-amd64" = "releases/gltf-scene/1.0.0/forge-handler-gltf-scene_windows-amd64.exe"
# "wasm"          = "releases/gltf-scene/1.0.0/forge-handler-gltf-scene.wasm"
#
# [assets.renderers."gltf-scene"."1.0.0"]
# "esm" = "releases/gltf-scene/1.0.0/renderer.js"

[assets]
# Will be populated as handler packages publish releases.
