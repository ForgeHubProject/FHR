# FHR Official Source Manifest
# Fetched by: forge source add https://raw.githubusercontent.com/forgehubproject/fhr/main/manifest.toml

name        = "fhr-official"
url         = "https://github.com/forgehubproject/fhr"
description = "Official Forge Handler Repository"
maintainer  = "ForgeHub Project"

# ── Formats ───────────────────────────────────────────────────────────────────
# Each key is a file extension mapped to a handler name and the short commit
# SHA (build) at which that handler was last published. forge formats update
# compares this build field against the locally-recorded build to decide
# whether a re-download is needed.

[formats]
".gltf" = { handler = "gltf-scene", build = "e520cc6" }
".glb"  = { handler = "gltf-scene", build = "e520cc6" }
".csv"  = { handler = "csv", build = "0000000" }

# ── Assets ────────────────────────────────────────────────────────────────────
# Full download URLs for handler binaries.
# The release tag `gltf-scene-latest` is a rolling release overwritten on each
# push to main that touches packages/handler-gltf-scene/.

[assets.handlers."gltf-scene"]
"linux-amd64"   = "https://github.com/forgehubproject/fhr/releases/download/gltf-scene-latest/forge-handler-gltf-scene_linux-amd64"
"linux-arm64"   = "https://github.com/forgehubproject/fhr/releases/download/gltf-scene-latest/forge-handler-gltf-scene_linux-arm64"
"darwin-amd64"  = "https://github.com/forgehubproject/fhr/releases/download/gltf-scene-latest/forge-handler-gltf-scene_darwin-amd64"
"darwin-arm64"  = "https://github.com/forgehubproject/fhr/releases/download/gltf-scene-latest/forge-handler-gltf-scene_darwin-arm64"
"windows-amd64" = "https://github.com/forgehubproject/fhr/releases/download/gltf-scene-latest/forge-handler-gltf-scene_windows-amd64.exe"
# WASM build of the same handler — lets ForgeHub / forge --web compute diffs in
# the browser (SPEC-RENDERING.md §2c, §4 Tier B). Same content-hash build as the
# native binaries above.
"wasm"          = "https://github.com/forgehubproject/fhr/releases/download/gltf-scene-latest/forge-handler-gltf-scene.wasm"

# The csv handler — rolling release `csv-latest`, overwritten on each push to
# main that touches packages/handler-csv/. CSV parses everywhere, so it ships
# the wasm build too (Tier B in-browser diff).
[assets.handlers."csv"]
"linux-amd64"   = "https://github.com/forgehubproject/fhr/releases/download/csv-latest/forge-handler-csv_linux-amd64"
"linux-arm64"   = "https://github.com/forgehubproject/fhr/releases/download/csv-latest/forge-handler-csv_linux-arm64"
"darwin-amd64"  = "https://github.com/forgehubproject/fhr/releases/download/csv-latest/forge-handler-csv_darwin-amd64"
"darwin-arm64"  = "https://github.com/forgehubproject/fhr/releases/download/csv-latest/forge-handler-csv_darwin-arm64"
"windows-amd64" = "https://github.com/forgehubproject/fhr/releases/download/csv-latest/forge-handler-csv_windows-amd64.exe"
"wasm"          = "https://github.com/forgehubproject/fhr/releases/download/csv-latest/forge-handler-csv.wasm"

# ── Renderers ─────────────────────────────────────────────────────────────────
# Self-contained ESM bundles (one per handler, not platform-keyed) that render a
# StructuredDiff in the browser. Consumed by ForgeHub web and forge's local
# `--web` shell via the mount() contract. See SPEC-RENDERING.md §2.

[assets.renderers]
"gltf-scene" = "https://github.com/forgehubproject/fhr/releases/download/gltf-scene-latest/renderer-gltf-scene.js"
"csv"        = "https://github.com/forgehubproject/fhr/releases/download/csv-latest/renderer-csv.js"
