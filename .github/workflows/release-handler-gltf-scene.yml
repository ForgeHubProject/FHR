name: Release gltf-scene handler

on:
  push:
    branches: [main]
    paths: ['packages/handler-gltf-scene/**']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: forge-handler-gltf-scene_linux-amd64
          - goos: linux
            goarch: arm64
            asset: forge-handler-gltf-scene_linux-arm64
          - goos: darwin
            goarch: amd64
            asset: forge-handler-gltf-scene_darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: forge-handler-gltf-scene_darwin-arm64
          - goos: windows
            goarch: amd64
            asset: forge-handler-gltf-scene_windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/handler-gltf-scene/go.mod

      - name: Build
        working-directory: packages/handler-gltf-scene
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -mod=mod -trimpath -ldflags="-s -w" -o ${{ matrix.asset }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: packages/handler-gltf-scene/${{ matrix.asset }}

  release:
    name: Publish rolling release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Delete existing rolling release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete gltf-scene-latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create rolling release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gltf-scene-latest
          name: "gltf-scene (latest)"
          body: "Rolling release — always points to the latest build from main."
          files: dist/*

  update-manifest:
    name: Update manifest build SHA
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch build SHA in manifest.toml
        env:
          SHA: ${{ needs.release.outputs.sha }}
        run: |
          sed -i 's/\(handler = "gltf-scene", build = "\)[^"]*"/\1'"$SHA"'"/' manifest.toml

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.toml
          git commit -m "chore: update gltf-scene build SHA to ${{ needs.release.outputs.sha }}"
          git push
