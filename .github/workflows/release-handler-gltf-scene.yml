name: Release gltf-scene handler

on:
  # Manual trigger — rerun the rolling release without a code change.
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'packages/handler-gltf-scene/**'
      - 'packages/renderer-gltf-scene/**'
      - 'packages/renderer-sdk/**'
      - 'packages/types/**'
      # Include this workflow so changes to how the release is built/published
      # (e.g. adding the 3D chunk) actually trigger a rebuild.
      - '.github/workflows/release-handler-gltf-scene.yml'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: forge-handler-gltf-scene_linux-amd64
          - goos: linux
            goarch: arm64
            asset: forge-handler-gltf-scene_linux-arm64
          - goos: darwin
            goarch: amd64
            asset: forge-handler-gltf-scene_darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: forge-handler-gltf-scene_darwin-arm64
          - goos: windows
            goarch: amd64
            asset: forge-handler-gltf-scene_windows-amd64.exe
          # Browser build for client-side (Tier B) diff/merge. Standard Go wasm;
          # revisit TinyGo if bundle size becomes a problem (SPEC-RENDERING §8 q2).
          - goos: js
            goarch: wasm
            asset: forge-handler-gltf-scene.wasm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/handler-gltf-scene/go.mod

      - name: Build
        working-directory: packages/handler-gltf-scene
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -mod=mod -trimpath -ldflags="-s -w" -o ${{ matrix.asset }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: packages/handler-gltf-scene/${{ matrix.asset }}

  build-renderer:
    name: Build renderer bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace deps
        run: npm ci

      - name: Build renderer (types → sdk → renderer)
        env:
          BUILD_SHA: ${{ github.sha }}
        run: |
          npm run build --workspace @fhr/types
          npm run build --workspace @fhr/renderer-sdk
          BUILD_SHA="$(git rev-parse --short HEAD)" npm run build --workspace @fhr/renderer-gltf-scene
          cp packages/renderer-gltf-scene/dist/renderer.js renderer-gltf-scene.js
          # The lite bundle lazy-imports this heavy three.js chunk as a sibling.
          cp packages/renderer-gltf-scene/dist/renderer-3d.js renderer-gltf-scene-3d.js

      - name: Upload renderer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: renderer-bundles
          path: |
            renderer-gltf-scene.js
            renderer-gltf-scene-3d.js

  release:
    name: Publish rolling release
    needs: [build, build-renderer]
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Delete existing rolling release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete gltf-scene-latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create rolling release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gltf-scene-latest
          name: "gltf-scene (latest)"
          body: "Rolling release — always points to the latest build from main. Includes native binaries, the wasm build, and the renderer bundle."
          files: dist/*

  update-manifest:
    name: Update manifest build SHA
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch build SHA in manifest.toml
        env:
          SHA: ${{ needs.release.outputs.sha }}
        run: |
          sed -i 's/\(handler = "gltf-scene", build = "\)[^"]*"/\1'"$SHA"'"/' manifest.toml

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.toml
          git diff --cached --quiet || git commit -m "chore: update gltf-scene build SHA to ${{ needs.release.outputs.sha }}"
          git push
